spring:
  application:
    name: docbrain

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:docbrain}
    username: ${PGUSER:docbrain}
    password: ${PGPASSWORD:docbrain}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Ensure baseline on migrate is enabled

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_FILE_SIZE:20MB}

  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}

server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-256-bits-long!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-1.5-flash # Keep this for generation
  embedding-model: gemini-embedding-001 # Corrected model name from API list

# File Upload Configuration
upload:
  dir: ${UPLOAD_DIR:./uploads}
  max-file-size-mb: 20
  allowed-types: pdf,docx,txt
  max-documents-per-collection: 50

# Chunking Configuration
chunking:
  chunk-size: 500
  chunk-overlap: 50

# Rate Limiting
rate-limit:
  questions-per-minute: 10
  uploads-per-hour: 5

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
