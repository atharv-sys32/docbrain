spring:
  application:
    name: docbrain

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/docbrain}
    username: ${DATABASE_USERNAME:docbrain}
    password: ${DATABASE_PASSWORD:docbrain}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_FILE_SIZE:20MB}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-256-bits-long!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash
  embedding-model: text-embedding-004

# File Upload Configuration
upload:
  dir: ${UPLOAD_DIR:./uploads}
  max-file-size-mb: 20
  allowed-types: pdf,docx,txt
  max-documents-per-collection: 50

# Chunking Configuration
chunking:
  chunk-size: 500
  chunk-overlap: 50

# Rate Limiting
rate-limit:
  questions-per-minute: 10
  uploads-per-hour: 5

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
